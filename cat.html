        const canvas = document.getElementById('catCanvas');
        const ctx = canvas.getContext('2d');
        
        function init() {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            catData.forEach(path => { path.points.forEach(p => {
                if (p[0] < minX) minX = p[0]; if (p[0] > maxX) maxX = p[0];
                if (p[1] < minY) minY = p[1]; if (p[1] > maxY) maxY = p[1];
            }); });
            
            const width = maxX - minX, height = maxY - minY, padding = 100;
            const scale = Math.min((canvas.width - padding) / width, (canvas.height - padding) / height);
            const offsetX = (canvas.width - width * scale) / 2 - minX * scale;
            const offsetY = (canvas.height - height * scale) / 2 - minY * scale;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            catData.forEach(path => {
                if (path.points.length < 2) return;
                ctx.beginPath();
                // Standard EPS to Canvas flip: y_canvas = (maxY - y_eps + minY)
                const startX = (path.points[0][0]) * scale + offsetX;
                const startY = (maxY - path.points[0][1] + minY) * scale + offsetY;
                ctx.moveTo(startX, startY);
                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo((path.points[i][0]) * scale + offsetX, (maxY - path.points[i][1] + minY) * scale + offsetY);
                }
                ctx.closePath(); 
                ctx.fillStyle = path.color; 
                ctx.fill();
            });
        }
