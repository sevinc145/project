        let showMesh = false;
        const canvas = document.getElementById('foxCanvas');
        const ctx = canvas.getContext('2d');
        function init() {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            foxData.forEach(path => { path.points.forEach(p => {
                if (p[0] < minX) minX = p[0]; if (p[0] > maxX) maxX = p[0];
                if (p[1] < minY) minY = p[1]; if (p[1] > maxY) maxY = p[1];
            }); });
            const width = maxX - minX, height = maxY - minY, padding = 120;
            const scale = Math.min((canvas.width - padding) / width, (canvas.height - padding) / height);
            const offsetX = (canvas.width - width * scale) / 2 - minX * scale;
            const offsetY = (canvas.height - height * scale) / 2 - minY * scale;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f9e4c8'; ctx.fillRect(0, 350, 1000, 300);
                foxData.forEach(path => {
                    ctx.beginPath();
                    // NO Y FLIP: If the previous flip resulted in an upside-down fox, then the EPS Y is already matching canvas Y orientation or vice versa.
                    const startX = path.points[0][0] * scale + offsetX;
                    const startY = (path.points[0][1] - minY) * scale + (canvas.height - height * scale) / 2;
                    ctx.moveTo(startX, startY);
                    for (let i = 1; i < path.points.length; i++) {
                        ctx.lineTo(path.points[i][0] * scale + offsetX, (path.points[i][1] - minY) * scale + (canvas.height - height * scale) / 2);
                    }
                    ctx.closePath(); ctx.fillStyle = path.color; ctx.fill();
                    if (showMesh) { ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.6; ctx.stroke(); }
                });
            }
            window.toggleMesh = () => { showMesh = !showMesh; draw(); };
            draw();
        }
        init();
